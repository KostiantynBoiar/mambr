# ZoomTrack — default config. Overlaid onto dataclass defaults by Config.load().
# Only keys that differ from the defaults need to appear; shown here for reference.
seed: 0

tiling:
  tile: 512
  overlap: 64
  downscale: 0.25

selector:
  mode: heuristic      # heuristic | learned
  tile_budget: 8       # held FIXED across heuristic/learned comparisons
  min_score: 0.2

fusion:
  iou_thresh: 0.5
  cont_thresh: 0.8
  mode: union          # union (recall) | prefer_tile (boundary precision)

tracking:
  iou_thresh: 0.3
  max_gap: 5

backbone:
  name: mock           # mock | sam2 | sam3

eval:
  small_percentile: 0.25
